name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm build

      - name: Validate SAM template
        run: sam validate

      - name: Build SAM app
        run: sam build

      - name: Deploy SAM app
        run: |
          sam deploy \
            --stack-name "${{ vars.BACKEND_STACK_NAME }}" \
            --region "${{ vars.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --s3-prefix "${{ vars.BACKEND_STACK_NAME }}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              FrontendOrigin="${{ vars.FRONTEND_ORIGIN }}" \
              VpcSubnetIds="${{ vars.VPC_SUBNET_IDS }}" \
              VpcSecurityGroupIds="${{ vars.VPC_SECURITY_GROUP_IDS }}" \
              DatabaseHost="${{ vars.DATABASE_HOST }}" \
              DatabasePort="${{ vars.DATABASE_PORT }}" \
              DatabaseName="${{ vars.DATABASE_NAME }}" \
              DatabaseUsername="${{ vars.DATABASE_USERNAME }}" \
              DatabaseSecretArn="${{ secrets.DATABASE_SECRET_ARN }}"

      - name: Read stack outputs
        id: stack
        working-directory: .
        run: |
          MIGRATION_FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name "${{ vars.BACKEND_STACK_NAME }}" \
            --region "${{ vars.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='MigrationFunctionName'].OutputValue" \
            --output text)
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ vars.BACKEND_STACK_NAME }}" \
            --region "${{ vars.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "migration_function_name=$MIGRATION_FUNCTION_NAME" >> "$GITHUB_OUTPUT"
          echo "api_url=${API_URL%/}" >> "$GITHUB_OUTPUT"

      - name: Run database migrations
        working-directory: .
        run: |
          aws lambda invoke \
            --function-name "${{ steps.stack.outputs.migration_function_name }}" \
            --region "${{ vars.AWS_REGION }}" \
            --cli-binary-format raw-in-base64-out \
            --payload '{}' \
            migration-output.json \
            > migration-response.json
          cat migration-response.json
          cat migration-output.json
          if jq -e '.FunctionError // empty' migration-response.json > /dev/null; then
            exit 1
          fi
          jq -e '.ok == true' migration-output.json > /dev/null

      - name: Verify backend
        working-directory: .
        run: |
          curl --fail --silent --show-error "${{ steps.stack.outputs.api_url }}/health"
          curl --fail --silent --show-error "${{ steps.stack.outputs.api_url }}/api/tokens"
